<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinksIn – Momentum Assured</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="auth.js"></script> <!-- Shared login script -->
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f3f4f6;
      font-family: Arial, sans-serif;
      padding: 1rem;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 400px;
      width: 100%;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 0.5s ease forwards;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: #666;
      margin-bottom: 1.5rem;
    }

    .button {
      display: block;
      margin: 0.5rem auto;
      padding: 0.75rem 1.25rem;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s;
      width: 100%;
      max-width: 300px;
    }

    .button:hover {
      background: #0056b3;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>LinksIn</h1>
    <p>Select a profile to view:</p>
    <a class="button" href="profile1.html">👩‍💼 Jane Smith</a>
    <a class="button" href="profile2.html">👨‍💼 John Doe</a>
  </div>
</body>
</html>
